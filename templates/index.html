<!DOCTYPE html>
<html>
<head>
    <title>SkyCast | Real-Time Weather</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4a90e2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px; }
        .app-card { background: white; width: 600px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .search-bar { padding: 25px; background: var(--primary); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 16px; }
        button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        
        .weather-content { padding: 30px; display: none; }
        .main-info { text-align: center; margin-bottom: 30px; }
        .temp { font-size: 64px; font-weight: bold; color: #333; margin: 10px 0; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-card i { color: var(--primary); font-size: 20px; margin-bottom: 8px; }
        .label { font-size: 12px; color: #777; display: block; }
        .value { font-weight: bold; font-size: 14px; }
        
        .downloads { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; justify-content: center; }
        .dl-btn { font-size: 12px; color: var(--primary); text-decoration: none; border: 1px solid var(--primary); padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="app-card">
        <div class="search-bar">
            <input type="text" id="cityInput" placeholder="Enter city (e.g. Paris, Tokyo)...">
            <button onclick="getWeather()">Search</button>
        </div>

        <div id="weatherContent" class="weather-content">
            <div class="main-info">
                <h2 id="cityName"></h2>
                <img id="wIcon" src="" alt="icon">
                <div class="temp" id="temp"></div>
                <div id="desc" style="color: #666; font-size: 18px;"></div>
            </div>

            <div class="grid">
                <div class="stat-card"><i class="fa-solid fa-wind"></i><span class="label">Wind</span><span class="value" id="wind"></span></div>
                <div class="stat-card"><i class="fa-solid fa-droplet"></i><span class="label">Humidity</span><span class="value" id="humidity"></span></div>
                <div class="stat-card"><i class="fa-solid fa-gauge"></i><span class="label">Pressure</span><span class="value" id="pressure"></span></div>
                <div class="stat-card"><i class="fa-solid fa-sun"></i><span class="label">Sunrise</span><span class="value" id="sunrise"></span></div>
                <div class="stat-card"><i class="fa-solid fa-moon"></i><span class="label">Sunset</span><span class="value" id="sunset"></span></div>
                <div class="stat-card"><i class="fa-solid fa-temperature-half"></i><span class="label">Feels Like</span><span class="value" id="feels"></span></div>
            </div>

            <div class="downloads">
                <a href="/download/csv" class="dl-btn">Export CSV</a>
                <a href="/download/excel" class="dl-btn">Export Excel</a>
                <a href="/download/xml" class="dl-btn">Export XML</a>
            </div>
        </div>
    </div>

    <script>
        async function getWeather() {
            const city = document.getElementById('cityInput').value;
            const res = await fetch('/get_weather', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({city})
            });
            const data = await res.json();
            
            if (res.ok) {
                document.getElementById('weatherContent').style.display = 'block';
                document.getElementById('cityName').innerText = `${data.City}, ${data.Country}`;
                document.getElementById('temp').innerText = data.Temperature;
                document.getElementById('desc').innerText = data.Description;
                document.getElementById('wind').innerText = data['Wind Speed'];
                document.getElementById('humidity').innerText = data.Humidity;
                document.getElementById('pressure').innerText = data.Pressure;
                document.getElementById('sunrise').innerText = data.Sunrise;
                document.getElementById('sunset').innerText = data.Sunset;
                document.getElementById('feels').innerText = data['Feels Like'];
                document.getElementById('wIcon').src = `http://openweathermap.org/img/wn/${data.Icon}@2x.png`;
            } else {
                alert(data.error);
            }
        }
    </script>
</body>
</html>
